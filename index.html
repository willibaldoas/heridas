<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heridas emocionales</title>

  <style>
    :root {
      --font-size: 18px;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: var(--font-size);
      background: #111;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 10px;
    }

    h1 {
      font-size: 1.8em;
      margin-bottom: 10px;
    }

    .contenedor {
      max-width: 600px;
      margin: auto;
    }

    button {
      width: 100%;
      margin: 8px 0;
      padding: 18px;
      font-size: 1.1em;
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
    }

    /* Colores con alto contraste */
    .rechazo { background: #c0392b; }
    .abandono { background: #2980b9; }
    .humillacion { background: #d68910; }
    .traicion { background: #6c3483; }
    .injusticia { background: #1e8449; }

    .resultado {
      margin-top: 15px;
      padding: 18px;
      border-radius: 12px;
      text-align: left;
      line-height: 1.5;
    }

    .label {
      font-weight: bold;
    }

    .acciones {
      margin-top: 10px;
    }

    .acciones button {
      background: #444;
    }

    /* Modo claro automático */
    @media (prefers-color-scheme: light) {
      body {
        background: #f4f4f4;
        color: #000;
      }

      .acciones button {
        background: #ddd;
        color: #000;
      }
    }
  </style>
</head>

<body>

  <h1>¿Qué estoy haciendo?</h1>

  <div class="contenedor">

    <button class="rechazo" onclick="mostrar('huir')">😶‍🌫️ ¿Estoy huyendo?</button>
    <button class="abandono" onclick="mostrar('depender')">🤝 ¿Estoy dependiendo?</button>
    <button class="humillacion" onclick="mostrar('complacer')">🙏 ¿Estoy complaciendo?</button>
    <button class="traicion" onclick="mostrar('controlar')">🧠 ¿Estoy controlando?/button>
    <button class="injusticia" onclick="mostrar('rigido')">📏 ¿Estoy siendo rígido?</button>

    <div id="resultado" class="resultado"></div>

    <div class="acciones">
      <button onclick="cambiarTexto()">🔍 Aumentar texto</button>
      <button onclick="leer()">🔊 Leer en voz alta</button>
    </div>

  </div>

  <script>
    let tamaño = 18;

    function cambiarTexto() {
      tamaño += 2;
      document.documentElement.style.setProperty('--font-size', tamaño + 'px');
    }

    function leer() {
      let texto = document.getElementById("resultado").innerText;
      let voz = new SpeechSynthesisUtterance(texto);
      voz.lang = "es-ES";
      speechSynthesis.speak(voz);
    }

    function mostrar(tipo) {
      const datos = {
        huir: {
          herida: "Rechazo 😶‍🌫️",
          color: "#c0392b",
          generado: "Rechazo del otro",
          objeto: "La existencia del otro",
          valor: "Dignidad",
          sentimiento: "Miedo a no existir",
          proteccion: "Huir",
          necesidad: "Aceptación",
          hacer: "Incluir y acercarse",
          decir: "Eres importante",
          evitar: "Ignorar"
        },
        depender: {
          herida: "Abandono 🤝",
          color: "#2980b9",
          generado: "Indiferencia",
          objeto: "Necesidades no atendidas",
          valor: "Confianza",
          sentimiento: "Miedo a la soledad",
          proteccion: "Dependencia",
          necesidad: "Acompañamiento",
          hacer: "Estar presente",
          decir: "Estoy contigo",
          evitar: "Dejar solo"
        },
        complacer: {
          herida: "Humillación 🙏",
          color: "#d68910",
          generado: "Vergüenza",
          objeto: "Espontaneidad",
          valor: "Autoestima",
          sentimiento: "Miedo a ser avergonzado",
          proteccion: "Complacer",
          necesidad: "Respeto",
          hacer: "Validar",
          decir: "No pasa nada",
          evitar: "Burlas"
        },
        controlar: {
          herida: "Traición 🧠",
          color: "#6c3483",
          generado: "Engaño",
          objeto: "Falta de lealtad",
          valor: "Confianza",
          sentimiento: "Miedo a que le fallen",
          proteccion: "Controlar",
          necesidad: "Seguridad",
          hacer: "Ser claro",
          decir: "Puedes confiar",
          evitar: "Mentir"
        },
        rigido: {
          herida: "Injusticia 📏",
          color: "#1e8449",
          generado: "Exigencia",
          objeto: "Imperfección",
          valor: "Valía",
          sentimiento: "Miedo a equivocarse",
          proteccion: "Rigidez",
          necesidad: "Reconocimiento",
          hacer: "Permitir errores",
          decir: "Está bien fallar",
          evitar: "Exigir perfección"
        }
      };

      let d = datos[tipo];
      let r = document.getElementById("resultado");

      r.style.background = d.color;

      r.innerHTML = `
        <h2>${d.herida}</h2>

        <p><span class="label">Generado por:</span> ${d.generado}</p>
        <p><span class="label">Objeto:</span> ${d.objeto}</p>
        <p><span class="label">Valor:</span> ${d.valor}</p>
        <p><span class="label">Sentimiento:</span> ${d.sentimiento}</p>
        <p><span class="label">Protección:</span> ${d.proteccion}</p>
        <p><span class="label">Necesidad:</span> ${d.necesidad}</p>

        <hr>

        <p><span class="label">Qué hacer:</span> ${d.hacer}</p>
        <p><span class="label">Qué decir:</span> ${d.decir}</p>
        <p><span class="label">Evitar:</span> ${d.evitar}</p>
      `;
    }
  </script>

</body>
</html>
