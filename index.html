<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heridas emocionales</title>

<style>
:root {
  --font-size: 18px;
}

body {
  font-family: Arial, sans-serif;
  font-size: var(--font-size);
  background: #111;
  color: #fff;
  margin: 0;
}

/* HEADER */
.header {
  padding: 15px;
  text-align: center;
  font-size: 1.5em;
  font-weight: bold;
}

/* CONTENEDOR */
.contenedor {
  max-width: 500px;
  margin: auto;
  padding: 10px;
}

/* TARJETAS */
.card {
  padding: 18px;
  border-radius: 15px;
  margin: 10px 0;
  cursor: pointer;
  transition: 0.3s;
  font-size: 1.1em;
}

.card:hover {
  transform: scale(1.03);
}

/* COLORES */
.rechazo { background: #c0392b; }
.abandono { background: #2980b9; }
.humillacion { background: #d68910; }
.traicion { background: #6c3483; }
.injusticia { background: #1e8449; }

/* RESULTADO */
.resultado {
  margin-top: 15px;
  padding: 20px;
  border-radius: 15px;
  display: none;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BOTONES FIJOS */
.barra {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #222;
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.barra button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* VOLVER */
.volver {
  display: none;
  margin: 10px 0;
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #444;
  color: white;
}

/* MODO CLARO */
@media (prefers-color-scheme: light) {
  body {
    background: #f4f4f4;
    color: #000;
  }
}
</style>
</head>

<body>

<div class="header">¿Qué estoy haciendo?</div>

<div class="contenedor">

  <!-- TARJETAS -->
  <div id="cards">
    <div class="card rechazo" onclick="mostrar(this,'huir')">😶‍🌫️ ¿Estoy huyendo?</div>
    <div class="card abandono" onclick="mostrar(this,'depender')">🤝 ¿Estoy dependiendo?</div>
    <div class="card humillacion" onclick="mostrar(this,'complacer')">🙏 ¿Estoy complaciendo?</div>
    <div class="card traicion" onclick="mostrar(this,'controlar')">🧠 ¿Estoy controlando?</div>
    <div class="card injusticia" onclick="mostrar(this,'rigido')">📏 ¿Estoy siendo rígido?</div>
  </div>

  <!-- VOLVER -->
  <button id="volver" class="volver" onclick="volver()">⬅️ Volver</button>

  <!-- RESULTADO -->
  <div id="resultado" class="resultado"></div>

</div>

<!-- BARRA INFERIOR -->
<div class="barra">
  <button onclick="aumentarTexto()">A+</button>
  <button onclick="disminuirTexto()">A-</button>
  <button onclick="leer()">🔊</button>
  <button onclick="detener()">⛔</button>
  <button onclick="donar()">❤️Séptima</button>
</div>

<script>
let tamaño = 18;

/* TEXTO */
function aumentarTexto() {
  tamaño += 2;
  document.documentElement.style.setProperty('--font-size', tamaño + 'px');
}

function disminuirTexto() {
  tamaño -= 2;
  if (tamaño < 12) tamaño = 12;
  document.documentElement.style.setProperty('--font-size', tamaño + 'px');
}

/* VOZ */
function leer() {
  let texto = document.getElementById("resultado").innerText;
  let voz = new SpeechSynthesisUtterance(texto);
  voz.lang = "es-ES";
  speechSynthesis.speak(voz);
}

function detener() {
  speechSynthesis.cancel();
}

/* DONAR */
function donar() {
  window.open("https://acacomenzardenuevo.org/#septima");
}

/* MOSTRAR */
function mostrar(card, tipo) {

  let cards = document.querySelectorAll(".card");

  cards.forEach(c => {
    if (c !== card) c.style.display = "none";
  });

  document.getElementById("volver").style.display = "block";

  const datos = {
    huir:{herida:"Rechazo 😶‍🌫️",color:"#c0392b",generado:"Rechazo del otro",objeto:"La existencia del otro",valor:"Dignidad",sentimiento:"Miedo a no existir",proteccion:"Huir",necesidad:"Aceptación",hacer:"Incluir",decir:"Eres importante",evitar:"Ignorar"},
    depender:{herida:"Abandono 🤝",color:"#2980b9",generado:"Indiferencia",objeto:"Necesidades no atendidas",valor:"Confianza",sentimiento:"Soledad",proteccion:"Dependencia",necesidad:"Acompañamiento",hacer:"Estar presente",decir:"Estoy contigo",evitar:"Dejar solo"},
    complacer:{herida:"Humillación 🙏",color:"#d68910",generado:"Vergüenza",objeto:"Espontaneidad",valor:"Autoestima",sentimiento:"Vergüenza",proteccion:"Complacer",necesidad:"Respeto",hacer:"Validar",decir:"No pasa nada",evitar:"Burlas"},
    controlar:{herida:"Traición 🧠",color:"#6c3483",generado:"Engaño",objeto:"Lealtad",valor:"Confianza",sentimiento:"Desconfianza",proteccion:"Controlar",necesidad:"Seguridad",hacer:"Ser claro",decir:"Puedes confiar",evitar:"Mentir"},
    rigido:{herida:"Injusticia 📏",color:"#1e8449",generado:"Exigencia",objeto:"Imperfección",valor:"Valía",sentimiento:"Error",proteccion:"Rigidez",necesidad:"Reconocimiento",hacer:"Permitir errores",decir:"Está bien fallar",evitar:"Perfección"}
  };

  let d = datos[tipo];
  let r = document.getElementById("resultado");

  r.style.display = "block";
  r.style.background = d.color;

  r.innerHTML = `
    <h2>${d.herida}</h2>
    <p><b>Generado por:</b> ${d.generado}</p>
    <p><b>Objeto:</b> ${d.objeto}</p>
    <p><b>Valor:</b> ${d.valor}</p>
    <p><b>Sentimiento:</b> ${d.sentimiento}</p>
    <p><b>Protección:</b> ${d.proteccion}</p>
    <p><b>Necesidad:</b> ${d.necesidad}</p>
    <hr>
    <p><b>Qué hacer:</b> ${d.hacer}</p>
    <p><b>Qué decir:</b> ${d.decir}</p>
    <p><b>Evitar:</b> ${d.evitar}</p>
  `;
}

/* VOLVER */
function volver() {
  document.querySelectorAll(".card").forEach(c => c.style.display = "block");
  document.getElementById("resultado").style.display = "none";
  document.getElementById("volver").style.display = "none";
}
</script>

</body>
</html>
